<!DOCTYPE html>
<html lang='en'>
    <head>
        <meta charset='utf-8'>
        <meta name='description' content='Fuse React - Material design admin template with pre-built apps and pages'>
        <meta name='keywords'
              content='React,Redux,Material UI Next,Material,Material Design,Google Material Design,HTML,CSS,Firebase,Authentication,Material Redux Theme,Material Redux Template'>
        <meta name='author' content='Withinpixels'>
        <meta name='viewport' content='width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no'>
        <meta name='theme-color' content='#000000'>
        <base href='/'>

        <link rel='manifest' href='/manifest.json'>
        <link rel='shortcut icon' href='/favicon.ico'>

        <link href='/assets/fonts/material-design-icons/MaterialIconsOutlined.css' rel='stylesheet'>
        <link href='/assets/fonts/Geist/geist.css' rel='stylesheet'>
        <link href='/assets/fonts/meteocons/style.css' rel='stylesheet'>
        <link href='/assets/styles/prism.css' rel='stylesheet'>

        <noscript id='emotion-insertion-point'></noscript>

        <!-- Google APIs for Drive Integration -->
        <script src="https://accounts.google.com/gsi/client" async defer></script>
        <script src="https://apis.google.com/js/api.js" async defer></script>

        <title>Fuse React - Material Design Admin Template</title>

        <!-- FUSE Splash Screen CSS -->
        <style>
            body #fuse-splash-screen {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: #121212;
                color: #E0E0E0;
                z-index: 999999;
                pointer-events: none;
                opacity: 1;
                visibility: visible;
                transition: opacity 400ms cubic-bezier(0.4, 0, 0.2, 1);
            }

            body #fuse-splash-screen img {
                width: 120px;
                max-width: 120px;
            }

            #spinner {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-top: 40px;
                width: 56px;
            }

            #spinner > div {
                width: 12px;
                height: 12px;
                background-color: #00A4EF;
                border-radius: 100%;
                display: inline-block;
                -webkit-animation: fuse-bouncedelay 1s infinite ease-in-out both;
                animation: fuse-bouncedelay 1s infinite ease-in-out both;
            }

            #spinner .bounce1 {
                -webkit-animation-delay: -0.32s;
                animation-delay: -0.32s;
            }

            #spinner .bounce2 {
                -webkit-animation-delay: -0.16s;
                animation-delay: -0.16s;
            }

            @-webkit-keyframes fuse-bouncedelay {
                0%, 80%, 100% {
                    -webkit-transform: scale(0)
                }
                40% {
                    -webkit-transform: scale(1.0)
                }
            }

            @keyframes fuse-bouncedelay {
                0%, 80%, 100% {
                    -webkit-transform: scale(0);
                    transform: scale(0);
                }
                40% {
                    -webkit-transform: scale(1.0);
                    transform: scale(1.0);
                }
            }
        </style>
    </head>
    <body id="root">
        <noscript>
            You need to enable JavaScript to run this app.
        </noscript>
        <div id='app' class='flex'>
            <div id='fuse-splash-screen'>
                <div class='logo'>
                    <img width='128' src='assets/images/logo/logo.svg' alt='logo'>
                </div>
                <div id='spinner'>
                    <div class='bounce1'></div>
                    <div class='bounce2'></div>
                    <div class='bounce3'></div>
                </div>
            </div>
        </div>
        <script type="module" src="/src/index.tsx"></script>
    </body>
</html>
